name: Weekly Audit

# Runs the topical authority pipeline against every site in examples/sites/*.yaml
# and uploads each run's outputs as workflow artifacts (private, 14-day retention).
#
# Snapshots are NOT committed back to this repo and are NOT published to GitHub
# Pages, because runs/ contains per-site audit data for clients/prospects and
# this repository is public. Keeping snapshots out of the public repo is a hard
# rule — see https://github.com/rebelionSEO/topical-authority-mapper README and
# .gitignore (runs/ is gitignored).
#
# Future: if persistent historical snapshots are needed, push them to a PRIVATE
# sibling repo using a deploy key or PAT — never back to this public repo.
#
# Trigger: weekly cron (Mondays 06:00 UTC) for CI exercise of the pipeline, or
# manually via "Run workflow".

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      site:
        description: 'Specific site config to run (filename in examples/sites/, no .yaml). Empty = all sites.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    name: Discover site configs
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.list.outputs.sites }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.site }}" ]; then
            sites="[\"${{ github.event.inputs.site }}\"]"
            count=1
          else
            shopt -s nullglob
            files=(examples/sites/*.yaml examples/sites/*.yml)
            real=()
            for f in "${files[@]}"; do
              base="$(basename "$f")"
              # Skip files starting with _ or named "example.yaml" (templates)
              [[ "$base" == _* ]] && continue
              [[ "$base" == "example.yaml" || "$base" == "example.yml" ]] && continue
              real+=("\"$(basename "$f" .yaml)\"")
            done
            if [ ${#real[@]} -eq 0 ]; then
              sites="[]"
              count=0
            else
              sites="[$(IFS=,; echo "${real[*]}")]"
              count=${#real[@]}
            fi
          fi
          echo "sites=$sites" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Discovered $count site(s): $sites"

  audit:
    name: Audit ${{ matrix.site }}
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        site: ${{ fromJSON(needs.discover.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cache HuggingFace model (sentence-transformers)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-all-MiniLM-L6-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run audit
        run: |
          mkdir -p runs
          python -m src.main \
            --config "examples/sites/${{ matrix.site }}.yaml" \
            --output-dir "output" \
            --runs-root "runs"

      - name: Upload audit outputs
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.site }}
          path: |
            runs/
            output/
          retention-days: 14

  notify-empty:
    name: No site configs found
    needs: discover
    if: needs.discover.outputs.count == '0'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "No site configs found in examples/sites/."
          echo "Add a YAML file (see examples/sites/_README.md) to run audits."
